{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BoostPro.cl | Soporte y Desarrollo{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="{% static 'web/css/estilos.css' %}?v=1.1">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-dark text-white">
    <div id="loader-bar" style="position:fixed; top:0; left:0; height:3px; background:#0dcaf0; width:0%; z-index:9999; transition: width 0.4s ease, opacity 0.4s ease; box-shadow: 0 0 10px #0dcaf0;"></div>

    {% include 'web/includes/_navbar.html' %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include 'web/includes/_footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="{% static 'web/js/main.js' %}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
