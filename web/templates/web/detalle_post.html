{% extends 'web/base.html' %}
{% load static %}

{% block content %}
<div class="main-wrapper" style="
    background-color: #121212 !important;
    background-image: linear-gradient(rgba(18, 18, 18, 0.9), rgba(18, 18, 18, 0.95)), 
                      url('https://images.pexels.com/photos/2582937/pexels-photo-2582937.jpeg?auto=compress&cs=tinysrgb&w=1600');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
    width: 100%;
    margin: 0;
    padding: 100px 0 50px 0;
    color: white;
">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb bg-transparent p-0">
                        <li class="breadcrumb-item"><a href="{% url 'home' %}" class="text-info text-decoration-none">Inicio</a></li>
                        <li class="breadcrumb-item active text-white-50">Blog</li>
                    </ol>
                </nav>

                <h1 class="display-3 fw-bold mb-4 text-white">{{ post.titulo }}</h1>
                
                <div class="d-flex gap-4 mb-5 text-info">
                    <span><i class="fas fa-calendar-day me-2"></i>{{ post.fecha_publicacion|date:"d/m/Y" }}</span>
                    <span><i class="fas fa-user-circle me-2"></i>{{ post.autor|default:"Admin" }}</span>
                </div>

                {% if post.imagen %}
                <div class="mb-5 shadow-lg">
                    <img src="{{ post.imagen.url }}" class="img-fluid rounded-4 w-100" style="border: 1px solid rgba(255,255,255,0.1); max-height: 500px; object-fit: cover;">
                </div>
                {% endif %}

                <div class="article-content" style="font-size: 1.15rem; line-height: 1.9; color: #f0f0f0;">
                    {{ post.contenido|safe }}
                </div>

                <div class="mt-5 pt-4 border-top border-secondary">
                    <a href="{% url 'home' %}#blog" class="btn btn-outline-info rounded-pill px-4">
                        <i class="fas fa-chevron-left me-2"></i> Volver al listado
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
